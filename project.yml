name: OniTan
options:
  bundleIdPrefix: com.fumiakiMogi777
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.1.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: 3.1.0

targets:
  OniTan:
    type: application
    platform: iOS
    sources:
      - path: OniTan
        excludes:
          - "**/*.md"
    resources:
      - path: OniTan/Resources
        optional: true
      - path: Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fumiakiMogi777.OniTan
        DEVELOPMENT_TEAM: ""   # 必要なら後で埋める（Simulatorだけなら空でOK）
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OniTan/Info.plist
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        product: GoogleUserMessagingPlatform

  OniTanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OniTanTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: OniTan

  OniTanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OniTanUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: OniTan
